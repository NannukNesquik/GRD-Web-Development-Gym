                            <div class="col">
                                <input type="text" class="form-control form-gym" placeholder="john.doe@example.com"
                                    aria-label="First name">
                            </div>
                        </div>
                        <h3>Message</h3>
                        <div class="row">
                            <div class="col">
                                <input type="text" class="form-control contact-form-message" placeholder="Leave us a message..."
                                    aria-label="First name">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col">
                                <button type="submit" class="button-reg button-text">Send Message</button>
                            </div>
